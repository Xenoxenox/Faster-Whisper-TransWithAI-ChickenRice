name: CI

# Build-and-check CI: lints the code and builds + e2e-smoke-tests every Windows
# variant, but never publishes a release. Releasing is handled separately by
# build-release-conda.yml (which runs on version tags).

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel superseded runs on the same branch / PR to avoid piling up expensive builds.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install lint tools
      run: |
        python -m pip install --upgrade pip
        # ruff pinned to match .pre-commit-config.yaml; mypy for type-checking.
        pip install "ruff==0.15.2" "mypy==1.18.2"

    - name: Ruff lint
      run: ruff check .

    - name: Ruff format check
      run: ruff format --check .

    - name: Mypy type-check (non-blocking)
      # Reports type issues but does not fail the build: the codebase has known
      # pre-existing mypy findings. Drop `continue-on-error` once those are cleaned up.
      continue-on-error: true
      run: mypy src infer.py download_models.py modal_infer.py build_windows.py runtime_hook.py

  # Build every Windows variant and run the executable smoke (e2e) checks.
  # upload_artifacts is disabled: CI only verifies the build/e2e, it does not distribute.
  build-windows:
    name: Build and check
    uses: ./.github/workflows/build-windows.yml
    with:
      upload_artifacts: false
