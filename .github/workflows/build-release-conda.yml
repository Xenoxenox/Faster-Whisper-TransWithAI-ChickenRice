name: Build and Release with Conda

# Release pipeline: builds every Windows variant and publishes a GitHub Release.
# Triggered on version tags, or manually when release_version is provided.
# Plain build-and-check on pushes/PRs is handled by ci.yml, which reuses the
# same build workflow.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0.0)'
        required: false
        type: string
      include_chickenrice:
        description: 'Deprecated and ignored; all model variants are included'
        required: false
        type: boolean
        default: false

jobs:
  # Build every Windows variant and run the executable smoke (e2e) checks,
  # then upload each build as an artifact for the publish jobs below.
  # Shared with ci.yml (which calls the same workflow with upload_artifacts: false).
  build-windows:
    name: Build Windows
    uses: ./.github/workflows/build-windows.yml
    # upload_artifacts defaults to true, so each variant is uploaded as an
    # artifact that the create-release / upload-* jobs download in this same run.

  # Create the initial GitHub release
  create-release:
    name: Create GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.release_version != ''
    permissions:
      contents: write
    outputs:
      release_created: ${{ steps.create.outputs.release_created }}

    steps:
    - name: Checkout code for release notes
      uses: actions/checkout@v4
      with:
        sparse-checkout: |
          RELEASE_NOTES_CN.md
        sparse-checkout-cone-mode: false

    - name: Read release body
      id: read_body
      run: |
        if [ -f "RELEASE_NOTES_CN.md" ]; then
          echo 'body<<EOF' >> $GITHUB_OUTPUT
          cat RELEASE_NOTES_CN.md >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
        else
          echo 'body=Release created by GitHub Actions' >> $GITHUB_OUTPUT
        fi

    - name: Create empty placeholder file for initial release
      run: |
        echo "This release contains large binary files. Files are being uploaded..." > placeholder.txt

    - name: Create Release with placeholder
      id: create
      uses: ading2210/gh-large-releases@v1
      with:
        repository: ${{ github.repository }}
        tag_name: ${{ inputs.release_version || github.ref_name }}
        name: ${{ inputs.release_version || github.ref_name }}
        body: ${{ steps.read_body.outputs.body }}
        draft: false
        prerelease: false
        files: placeholder.txt
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set output
      run: echo "release_created=true" >> $GITHUB_OUTPUT

  # Parallel upload matrix - each row handles one build/model artifact.
  upload-assets:
    name: Upload ${{ matrix.build.label }} ${{ matrix.model.label }}
    needs: [create-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.release_version != ''
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        build:
          - suffix: cu118
            label: CUDA 11.8
          - suffix: cu122
            label: CUDA 12.2
          - suffix: cu128
            label: CUDA 12.8
          - suffix: gfx101x_dgpu
            label: AMD gfx101X
          - suffix: gfx103x_dgpu
            label: AMD gfx103X
          - suffix: gfx110x_all
            label: AMD gfx110X
          - suffix: gfx120x_all
            label: AMD gfx120X
        model:
          - suffix: nomodel
            label: No Model
          - suffix: translate
            label: Translate
          - suffix: transcribe
            label: Transcribe

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v6
      with:
        name: faster_whisper_transwithai_windows_${{ matrix.build.suffix }}-${{ matrix.model.suffix }}
        path: artifact/

    - name: Create archive with optimized compression
      run: |
        archive_name="faster_whisper_transwithai_windows_${{ matrix.build.suffix }}-${{ matrix.model.suffix }}.zip"
        cd artifact
        echo "Creating archive for ${{ matrix.build.label }} ${{ matrix.model.label }} variant..."
        # Using compression level 5 for faster builds (was level 9).
        # Level 5 provides good balance between speed and compression ratio.
        zip -5 -r -q "../$archive_name" .
        cd ..
        echo "Archive created: $(ls -lh "$archive_name" | awk '{print $5}')"

    - name: Upload to release with large file support
      uses: ading2210/gh-large-releases@v1
      with:
        repository: ${{ github.repository }}
        tag_name: ${{ inputs.release_version || github.ref_name }}
        files: faster_whisper_transwithai_windows_${{ matrix.build.suffix }}-${{ matrix.model.suffix }}.zip
        token: ${{ secrets.GITHUB_TOKEN }}
